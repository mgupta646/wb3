<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f6f8ff; width: 100vw; height: 100vh; overflow: hidden; cursor: none; }
  canvas { position: fixed; top: 0; left: 0; }
  #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
  #cursor      { position:fixed;width:12px;height:12px;background:rgba(167,139,250,0.95);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 12px 3px rgba(167,139,250,0.6); }
  #cursor-ring { position:fixed;width:40px;height:40px;border:2px solid rgba(167,139,250,0.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%); }
  #cursor-ring2{ position:fixed;width:72px;height:72px;border:1px solid rgba(56,189,248,0.22);border-radius:50%;pointer-events:none;z-index:9997;transform:translate(-50%,-50%); }
</style>
</head>
<body>
<canvas id="aurora"></canvas>
<canvas id="c"></canvas>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="cursor-ring2"></div>

<script>
// ── Two canvases: aurora on a slow offscreen, particles on main ──
const aCanvas = document.getElementById('aurora');
const aC      = aCanvas.getContext('2d');
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');

// CSS stacking
aCanvas.style.cssText = 'position:fixed;top:0;left:0;z-index:0;';
canvas.style.cssText  = 'position:fixed;top:0;left:0;z-index:1;';

let W = window.innerWidth, H = window.innerHeight;
[aCanvas, canvas].forEach(c => { c.width = W; c.height = H; });

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  [aCanvas, canvas].forEach(c => { c.width = W; c.height = H; });
  buildAuroraCache();
  initParticles();
});

// ── Cursor ───────────────────────────────────────────────────
const cursorEl = document.getElementById('cursor');
const ringEl   = document.getElementById('cursor-ring');
const ring2El  = document.getElementById('cursor-ring2');
let mx=W/2, my=H/2, cx=W/2, cy=H/2, r1x=W/2, r1y=H/2, r2x=W/2, r2y=H/2;

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
document.addEventListener('mousedown', () => {
  cursorEl.style.background = 'rgba(244,114,182,0.95)';
  for (let i = 0; i < 30; i++) bursts.push(new Burst(mx, my));
});
document.addEventListener('mouseup', () => {
  cursorEl.style.background = 'rgba(167,139,250,0.95)';
});

// ── Aurora — drawn to offscreen every 3 frames, NO ctx.filter ─
const waves = [
  { color:[167,139,250], phase:0,   speed:0.018, amp:0.13, yBase:0.35 },
  { color:[56,189,248],  phase:2.1, speed:0.014, amp:0.10, yBase:0.50 },
  { color:[244,114,182], phase:4.2, speed:0.020, amp:0.09, yBase:0.65 },
  { color:[52,211,153],  phase:1.5, speed:0.016, amp:0.08, yBase:0.42 },
  { color:[251,191,36],  phase:3.3, speed:0.019, amp:0.07, yBase:0.57 },
];

// Pre-build blurred aurora gradient on an offscreen canvas
let auroraCache = null;
function buildAuroraCache() {
  const oc  = document.createElement('canvas');
  oc.width  = W; oc.height = H;
  const oc2 = oc.getContext('2d');
  // Static radial orbs — very cheap, just drawn once per rebuild
  const orbs = [
    {x:-0.08,y:-0.15,r:0.55,c:[167,139,250],a:0.20},
    {x:1.10, y:0.25, r:0.50,c:[56,189,248], a:0.17},
    {x:0.30, y:1.05, r:0.45,c:[244,114,182],a:0.15},
    {x:0.80, y:0.05, r:0.38,c:[52,211,153], a:0.13},
    {x:0.05, y:0.70, r:0.35,c:[251,191,36], a:0.11},
  ];
  orbs.forEach(o => {
    const [r,g,b]=o.c, px=o.x*W, py=o.y*H, pr=o.r*Math.max(W,H);
    const g2 = oc2.createRadialGradient(px,py,0,px,py,pr);
    g2.addColorStop(0, `rgba(${r},${g},${b},${o.a})`);
    g2.addColorStop(1, `rgba(${r},${g},${b},0)`);
    oc2.fillStyle = g2;
    oc2.fillRect(0,0,W,H);
  });
  auroraCache = oc;
}
buildAuroraCache();

// Smooth aurora wave — uses alpha-blended filled paths, no blur filter
function drawAuroraWave(wave, t) {
  const {color:[r,g,b],phase,speed,amp,yBase} = wave;
  const steps = 80; // fewer steps = faster

  // Two bands with decreasing alpha = soft glow without ctx.filter
  [[0.06, 0],[0.035, 0.06],[0.018, 0.12]].forEach(([alpha, extra]) => {
    aC.beginPath();
    for (let i=0; i<=steps; i++) {
      const x  = (i/steps)*W, nx = i/steps;
      const y  = H*yBase
        + Math.sin(nx*8   + phase + t*speed*60)*H*amp
        + Math.sin(nx*3.7 + phase*1.3 + t*speed*40)*H*amp*0.5
        + Math.cos(nx*5.1 + phase*0.7 + t*speed*50)*H*amp*0.3
        - H*0.12 - extra*H;
      i===0 ? aC.moveTo(x,y) : aC.lineTo(x,y);
    }
    for (let i=steps; i>=0; i--) {
      const x  = (i/steps)*W, nx = i/steps;
      const y  = H*yBase
        + Math.sin(nx*8   + phase + t*speed*60)*H*amp
        + Math.sin(nx*3.7 + phase*1.3 + t*speed*40)*H*amp*0.5
        + Math.cos(nx*5.1 + phase*0.7 + t*speed*50)*H*amp*0.3
        + H*0.12 + extra*H;
      aC.lineTo(x,y);
    }
    aC.closePath();
    aC.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    aC.fill();
  });
}

// ── Palette ──────────────────────────────────────────────────
const PAL = [
  [167,139,250],[56,189,248],[244,114,182],
  [52,211,153],[251,191,36],[129,140,248],[248,113,113],
];

// ── Particles — NO shadowBlur ─────────────────────────────────
const COUNT = 80;
let particles = [];

class Particle {
  constructor(rndY=false) { this.reset(rndY); }
  reset(rndY=false) {
    this.x     = Math.random()*W;
    this.y     = rndY ? Math.random()*H : H+10;
    const spd  = Math.random()*1.8 + 0.6;
    this.vx    = (Math.random()-0.5)*0.8;
    this.vy    = -spd;
    this.r     = Math.random()*3 + 0.8;
    this.life  = 1;
    this.decay = Math.random()*0.005 + 0.002;
    this.ci    = Math.floor(Math.random()*PAL.length);
    this.shape = Math.floor(Math.random()*3);
    this.rot   = Math.random()*Math.PI*2;
    this.rotV  = (Math.random()-0.5)*0.07;
  }
  update() {
    this.x   += this.vx;
    this.y   += this.vy;
    this.vx  += (Math.random()-0.5)*0.04;
    this.rot += this.rotV;
    this.life-= this.decay;
    if (this.life<=0||this.y<-20||this.x<-30||this.x>W+30) this.reset();
  }
  draw() {
    const [r,g,b] = PAL[this.ci];
    ctx.save();
    ctx.globalAlpha = this.life*0.75;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.fillStyle   = `rgb(${r},${g},${b})`;
    ctx.strokeStyle = `rgb(${r},${g},${b})`;
    if (this.shape===0) {
      ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill();
    } else if (this.shape===1) {
      ctx.beginPath(); ctx.arc(0,0,this.r*1.6,0,Math.PI*2);
      ctx.lineWidth=this.r*0.5; ctx.stroke();
    } else {
      const d=this.r*2.2;
      ctx.beginPath();
      ctx.moveTo(0,-d); ctx.lineTo(d*0.5,0);
      ctx.lineTo(0,d);  ctx.lineTo(-d*0.5,0);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
}

// ── Cursor trail — small dots, NO shadowBlur ──────────────────
let trail = [];
class Trail {
  constructor(x,y) {
    this.x=x; this.y=y;
    this.r=Math.random()*4+1.5;
    this.life=1;
    this.decay=Math.random()*0.08+0.05;
    this.ci=Math.floor(Math.random()*PAL.length);
    this.vx=(Math.random()-0.5)*2;
    this.vy=(Math.random()-0.5)*2;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.vx*=0.9; this.vy*=0.9; this.life-=this.decay; return this.life>0; }
  draw() {
    const [r,g,b]=PAL[this.ci];
    ctx.save();
    ctx.globalAlpha=this.life*0.65;
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Click burst ───────────────────────────────────────────────
let bursts = [];
class Burst {
  constructor(x,y) {
    this.x=x; this.y=y;
    const a=Math.random()*Math.PI*2, spd=Math.random()*9+4;
    this.vx=Math.cos(a)*spd; this.vy=Math.sin(a)*spd;
    this.r=Math.random()*4+2;
    this.life=1; this.decay=Math.random()*0.03+0.02;
    this.ci=Math.floor(Math.random()*PAL.length);
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.vx*=0.92; this.vy*=0.92; this.life-=this.decay; return this.life>0; }
  draw() {
    const [r,g,b]=PAL[this.ci];
    ctx.save();
    ctx.globalAlpha=this.life;
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Cursor glow — single cheap gradient, no shadow ────────────
function drawCursorGlow() {
  const g = ctx.createRadialGradient(cx,cy,0,cx,cy,180);
  g.addColorStop(0,'rgba(167,139,250,0.15)');
  g.addColorStop(1,'rgba(167,139,250,0)');
  ctx.save();
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(cx,cy,180,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Connections — spatial grid to avoid O(n²) ─────────────────
function drawConnections() {
  const D=110, D2=D*D;
  ctx.save();
  // Only check neighbouring bucket cells
  for (let i=0; i<particles.length; i++) {
    for (let j=i+1; j<Math.min(i+12, particles.length); j++) {
      const dx=particles[i].x-particles[j].x;
      const dy=particles[i].y-particles[j].y;
      const d2=dx*dx+dy*dy;
      if (d2<D2) {
        const t=1-Math.sqrt(d2)/D;
        const [r,g,b]=PAL[particles[i].ci];
        ctx.globalAlpha=t*0.09*particles[i].life;
        ctx.strokeStyle=`rgb(${r},${g},${b})`;
        ctx.lineWidth=t*1.2;
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.stroke();
      }
    }
  }
  ctx.restore();
}

function initParticles() {
  particles = Array.from({length:COUNT}, ()=>new Particle(true));
}
initParticles();

// ── Main loop ─────────────────────────────────────────────────
let frame=0, aFrame=0;
function loop() {
  const t = frame/60;

  // Aurora canvas — only repaint every 3 frames
  if (frame%3===0) {
    aC.clearRect(0,0,W,H);
    aC.fillStyle='#f6f8ff';
    aC.fillRect(0,0,W,H);
    aC.drawImage(auroraCache,0,0);   // static orb blobs
    waves.forEach(w=>drawAuroraWave(w,t));
  }

  // Particle canvas — every frame
  ctx.clearRect(0,0,W,H);

  // Spawn trail
  if (frame%2===0) trail.push(new Trail(cx,cy));

  drawCursorGlow();
  drawConnections();
  particles.forEach(p=>{p.update();p.draw();});
  trail  = trail.filter(d=>{d.draw();return d.update();});
  bursts = bursts.filter(b=>{b.draw();return b.update();});

  // Cursor smoothing
  cx  +=(mx-cx)*0.16;
  cy  +=(my-cy)*0.16;
  r1x +=(mx-r1x)*0.09;
  r1y +=(my-r1y)*0.09;
  r2x +=(mx-r2x)*0.05;
  r2y +=(my-r2y)*0.05;

  cursorEl.style.left=cx+'px'; cursorEl.style.top=cy+'px';
  ringEl.style.left=r1x+'px';  ringEl.style.top=r1y+'px';
  ring2El.style.left=r2x+'px'; ring2El.style.top=r2y+'px';

  frame++;
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
